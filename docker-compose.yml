version: "3.9"
services:
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_BASE=http://backend:5000
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - ai-service
      - blockchain-sim

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"

  blockchain-sim:
    build: ./blockchain-sim
    ports:
      - "7000:7000"
